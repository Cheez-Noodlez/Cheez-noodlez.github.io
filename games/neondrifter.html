<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Drifter: Shapy Collapse</title>
    <style>
        :root {
            --neon-red: #ff3131;
            --neon-blue: #00f2ff;
            --neon-purple: #9d00ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050005;
            font-family: 'Orbitron', sans-serif;
            touch-action: none; /* Prevents browser pull-to-refresh and zoom */
            -webkit-user-select: none;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            filter: contrast(1.6) brightness(1.1) saturate(1.8);
            width: 100%;
            height: 100%;
        }

        #ui-overlay {
            position: absolute;
            top: env(safe-area-inset-top, 30px);
            left: env(safe-area-inset-left, 30px);
            pointer-events: none;
            z-index: 5;
        }

        .score-board {
            font-size: clamp(30px, 8vw, 60px);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px var(--neon-red), 4px 4px 0px var(--neon-purple);
            font-style: italic;
        }

        #player-id-tag {
            font-size: clamp(9px, 2vw, 11px);
            margin-top: 5px;
            letter-spacing: 3px;
            color: #fff;
            background: linear-gradient(90deg, var(--neon-red), transparent);
            padding: 4px 15px;
            clip-path: polygon(0 0, 90% 0, 100% 100%, 0% 100%);
        }

        #start-screen {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        #end-stats {
            margin-top: 20px;
            display: none;
            color: #fff;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .final-score-label {
            font-size: clamp(1rem, 4vw, 1.2rem);
            color: var(--neon-blue);
            letter-spacing: 4px;
        }

        .final-score-val {
            font-size: clamp(2.5rem, 10vw, 4rem);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px var(--neon-red);
            margin: 10px 0;
        }

        .best-score {
            font-size: 0.9rem;
            opacity: 0.6;
            letter-spacing: 2px;
        }

        h1 {
            font-size: clamp(3rem, 18vw, 10rem);
            color: #fff;
            margin: 0;
            line-height: 0.8;
            filter: drop-shadow(0 0 30px var(--neon-blue));
            transform: skewX(-10deg);
        }

        .btn {
            margin-top: 40px;
            padding: clamp(15px, 5vw, 25px) clamp(40px, 12vw, 80px);
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            background: #fff;
            border: none;
            color: #000;
            cursor: pointer;
            font-weight: 900;
            clip-path: polygon(15% 0, 100% 0, 85% 100%, 0% 100%);
            transition: 0.3s;
        }

        .btn:active {
            background: var(--neon-red);
            color: #fff;
            transform: scale(0.95);
        }

        #status-code {
            color: var(--neon-red);
            font-size: 0.8rem;
            margin-top: 20px;
            letter-spacing: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-overlay">
        <div class="score-board" id="score-val">000000</div>
        <div id="player-id-tag">TAB_DRIVER_v4.5</div>
    </div>

    <div id="start-screen">
        <h1 id="main-title">SHAPY</h1>
        
        <div id="end-stats">
            <div class="final-score-label">DATA RETRIEVED:</div>
            <div class="final-score-val" id="final-score-display">0</div>
            <div class="best-score">SESSION BEST: <span id="best-score-display">0</span></div>
        </div>

        <div id="status-code">MOBILE_OPTIMIZED: ACTIVE</div>
        <button class="btn" id="start-btn" disabled>LINK_CORE</button>
    </div>

    <canvas id="canvas"></canvas>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAnKSx-JXfRwqPvk0_9rZML3wTjWC9-jZw",
        authDomain: "multiplayerdrifter.firebaseapp.com",
        databaseURL: "https://multiplayerdrifter-default-rtdb.firebaseio.com",
        projectId: "multiplayerdrifter",
        storageBucket: "multiplayerdrifter.firebasestorage.app",
        appId: "1:354638081463:web:ba421ae6e5d49122cd0c32"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreVal = document.getElementById('score-val');
    const startScreen = document.getElementById('start-screen');
    const startBtn = document.getElementById('start-btn');
    const idTag = document.getElementById('player-id-tag');
    const endStats = document.getElementById('end-stats');
    const finalScoreDisplay = document.getElementById('final-score-display');
    const bestScoreDisplay = document.getElementById('best-score-display');

    let width, height, dpr, animationId, user, syncInterval;
    let score = 0, frame = 0, shake = 0, gameActive = false, bestScore = 0;
    let otherPlayers = {}, enemies = [], projectiles = [], cores = [];
    let blackHole = null;

    const player = { 
        x: 0, y: 0, tx: 0, ty: 0, 
        history: [], 
        color: '#00f2ff',
        size: 20
    };

    async function init() {
        resize();
        try { await signInAnonymously(auth); } catch (e) {}
    }

    onAuthStateChanged(auth, (u) => {
        if (u) {
            user = u;
            idTag.innerText = `PILOT_${user.uid.substring(0,6).toUpperCase()}`;
            startBtn.disabled = false;
            startBtn.innerText = "INIT_SESSION";
            setupNetwork();
        }
    });

    function setupNetwork() {
        onValue(ref(db, 'players'), (snap) => {
            const data = snap.val() || {};
            const current = {};
            Object.keys(data).forEach(id => {
                if (id !== user.uid) current[id] = data[id];
            });
            otherPlayers = current;
        });
        onDisconnect(ref(db, `players/${user.uid}`)).remove();
    }

    function drawPolygon(x, y, radius, sides, rotation = 0, stroke = true) {
        ctx.beginPath();
        for (let i = 0; i < sides; i++) {
            const angle = rotation + (i * 2 * Math.PI) / sides;
            const px = x + radius * Math.cos(angle);
            const py = y + radius * Math.sin(angle);
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.closePath();
        if (stroke) ctx.stroke();
        else ctx.fill();
    }

    function spawnEnemy() {
        const side = Math.floor(Math.random() * 4);
        let x, y;
        if (side === 0) { x = -50; y = Math.random() * height; }
        else if (side === 1) { x = width + 50; y = Math.random() * height; }
        else if (side === 2) { x = Math.random() * width; y = -50; }
        else { x = Math.random() * width; y = height + 50; }
        
        const types = [
            { type: 'hex', sides: 6, speed: 3.5, size: 20, color: '#ff3131' },
            { type: 'tri', sides: 3, speed: 5.5, size: 15, color: '#ff9d00' },
            { type: 'dia', sides: 4, speed: 2.5, size: 30, color: '#9d00ff' }
        ];
        const config = types[Math.floor(Math.random() * types.length)];
        
        enemies.push({
            ...config, x, y, 
            rot: Math.random() * Math.PI,
            trail: []
        });
    }

    function update() {
        frame++;
        
        if (frame % 60 === 0) spawnEnemy();
        if (frame % 800 === 0) blackHole = { x: width/2, y: height/2, r: 0, life: 300 };

        player.x += (player.tx - player.x) * 0.15;
        player.y += (player.ty - player.y) * 0.15;
        player.history.push({x: player.x, y: player.y});
        if (player.history.length > 20) player.history.shift();

        if (blackHole) {
            blackHole.r = Math.min(120, blackHole.r + 1);
            blackHole.life--;
            const d = Math.hypot(player.x - blackHole.x, player.y - blackHole.y);
            if (d < blackHole.r + 15) gameOver();
            if (d < 500) {
                const f = (500 - d) / 1200;
                player.x -= (player.x - blackHole.x) * f;
                player.y -= (player.y - blackHole.y) * f;
            }
            if (blackHole.life <= 0) blackHole = null;
        }

        enemies.forEach((e, i) => {
            const angle = Math.atan2(player.y - e.y, player.x - e.x);
            e.x += Math.cos(angle) * (e.speed + score/6000);
            e.y += Math.sin(angle) * (e.speed + score/6000);
            e.rot += 0.05;

            e.trail.push({x: e.x, y: e.y});
            if (e.trail.length > 15) e.trail.shift();

            if (Math.hypot(player.x - e.x, player.y - e.y) < e.size + 10) gameOver();
            
            if (e.type === 'dia' && frame % 120 === 0) {
                for(let j=0; j<4; j++) {
                    const a = e.rot + (j * Math.PI/2);
                    projectiles.push({x: e.x, y: e.y, vx: Math.cos(a)*6, vy: Math.sin(a)*6, color: e.color});
                }
            }
        });

        projectiles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy;
            if (Math.hypot(player.x - p.x, player.y - p.y) < 12) gameOver();
            if (p.x < -100 || p.x > width + 100 || p.y < -100 || p.y > height + 100) projectiles.splice(i, 1);
        });

        if (cores.length < 2) cores.push({x: Math.random()*(width*0.8)+(width*0.1), y: Math.random()*(height*0.8)+(height*0.1), rot: 0});
        cores.forEach((c, i) => {
            c.rot -= 0.1;
            if (Math.hypot(player.x - c.x, player.y - c.y) < 40) {
                score += 1000;
                scoreVal.innerText = score.toString().padStart(6, '0');
                shake = 25;
                cores.splice(i, 1);
            }
        });

        const wall = Math.min(width * 0.3, score / 45);
        if (player.x < wall || player.x > width - wall || player.y < wall || player.y > height - wall) gameOver();

        shake *= 0.9;
    }

    function draw() {
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.fillStyle = '#050005';
        ctx.fillRect(0, 0, width, height);

        ctx.save();
        if (shake > 1) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);

        // Hex Grid
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)';
        ctx.lineWidth = 1;
        const hexSize = 50;
        for (let y = 0; y < height + hexSize; y += hexSize * 1.5) {
            for (let x = 0; x < width + hexSize; x += hexSize * Math.sqrt(3)) {
                const xOffset = (Math.floor(y / (hexSize * 1.5)) % 2) * (hexSize * Math.sqrt(3) / 2);
                drawPolygon(x + xOffset, y, hexSize, 6, Math.PI / 2);
            }
        }

        const wall = Math.min(width * 0.3, score / 45);
        ctx.strokeStyle = '#ff3131';
        ctx.lineWidth = 4;
        ctx.shadowBlur = 15; ctx.shadowColor = '#ff3131';
        ctx.strokeRect(wall, wall, width - wall*2, height - wall*2);
        ctx.shadowBlur = 0;

        if (blackHole) {
            ctx.fillStyle = '#000';
            ctx.shadowBlur = 40; ctx.shadowColor = '#9d00ff';
            drawPolygon(blackHole.x, blackHole.y, blackHole.r, 8, frame * 0.02, false);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
        }

        cores.forEach(c => {
            ctx.strokeStyle = '#00f2ff';
            ctx.shadowBlur = 10; ctx.shadowColor = '#00f2ff';
            drawPolygon(c.x, c.y, 20, 3, c.rot);
            drawPolygon(c.x, c.y, 10, 3, -c.rot);
        });

        enemies.forEach(e => {
            ctx.strokeStyle = e.color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.globalAlpha = 0.2;
            e.trail.forEach((t, idx) => {
                idx === 0 ? ctx.moveTo(t.x, t.y) : ctx.lineTo(t.x, t.y);
            });
            ctx.stroke();
            ctx.globalAlpha = 1;
            drawPolygon(e.x, e.y, e.size, e.sides, e.rot);
        });

        projectiles.forEach(p => {
            ctx.fillStyle = '#fff';
            drawPolygon(p.x, p.y, 6, 4, frame*0.1, false);
        });

        Object.keys(otherPlayers).forEach(id => {
            const op = otherPlayers[id];
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            drawPolygon(op.x, op.y, 15, 6, frame*0.05);
        });

        ctx.strokeStyle = player.color;
        ctx.lineWidth = 5;
        ctx.shadowBlur = 20; ctx.shadowColor = player.color;
        ctx.beginPath();
        player.history.forEach((h, i) => {
            i === 0 ? ctx.moveTo(h.x, h.y) : ctx.lineTo(h.x, h.y);
        });
        ctx.stroke();
        drawPolygon(player.x, player.y, player.size, 4, Math.atan2(player.y - (player.history[0]?.y || player.y), player.x - (player.history[0]?.x || player.x)));

        ctx.restore();
    }

    function gameOver() {
        gameActive = false;
        clearInterval(syncInterval);
        cancelAnimationFrame(animationId);
        
        if (score > bestScore) bestScore = score;
        finalScoreDisplay.innerText = score.toLocaleString();
        bestScoreDisplay.innerText = bestScore.toLocaleString();
        
        startScreen.style.display = 'flex';
        endStats.style.display = 'block';
        document.getElementById('main-title').innerText = "VAPORIZED";
        document.getElementById('main-title').style.color = "#ff3131";
        startBtn.innerText = "RE_MATERIALIZE";
    }

    function gameLoop() {
        if (!gameActive) return;
        update();
        draw();
        animationId = requestAnimationFrame(gameLoop);
    }

    function startGame() {
        score = 0; frame = 0;
        enemies = []; projectiles = []; cores = [];
        blackHole = null;
        gameActive = true;
        startScreen.style.display = 'none';
        endStats.style.display = 'none';
        scoreVal.innerText = "000000";
        player.x = width/2; player.y = height/2;
        player.tx = width/2; player.ty = height/2;
        player.history = [];
        syncInterval = setInterval(() => {
            if (user && gameActive) set(ref(db, `players/${user.uid}`), { x: player.x, y: player.y, score });
        }, 60);
        gameLoop();
    }

    function resize() {
        dpr = window.devicePixelRatio || 1;
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width * dpr;
        canvas.height = height * dpr;
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
    }

    function handleInput(e) {
        if (!gameActive) return;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        player.tx = clientX;
        player.ty = clientY;
    }

    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', handleInput);
    window.addEventListener('touchmove', (e) => {
        e.preventDefault();
        handleInput(e);
    }, { passive: false });
    window.addEventListener('touchstart', (e) => {
        if (gameActive) handleInput(e);
    }, { passive: false });

    startBtn.addEventListener('click', startGame);
    startBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        startGame();
    });

    init();
</script>
</body>
</html>
