<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheez-Noodlez Time Machine</title>
    <style>
        :root {
            --cheese-yellow: #FFD700;
            --cheese-orange: #FF8C00;
            --deep-space: #1a1a1a;
            --neon-blue: #00f2ff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--deep-space);
            color: var(--cheese-yellow);
            overflow-x: hidden;
            background: radial-gradient(circle at center, #2c2c2c 0%, #000 100%);
        }

        /* --- POPUP STYLES --- */
        .popup-overlay {
            display: none; /* Controlled by JS */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .popup-content {
            background: linear-gradient(135deg, var(--cheese-yellow), var(--cheese-orange));
            padding: 60px 40px;
            border-radius: 20px;
            text-align: center;
            position: relative;
            max-width: 400px;
            width: 90%;
            color: #000;
            box-shadow: 0 0 50px var(--cheese-orange);
            border: 4px solid white;
        }

        .close-x {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .close-x:hover {
            transform: scale(1.2) rotate(90deg);
        }

        .popup-content h1 {
            font-size: 3.5rem;
            margin: 0;
            text-shadow: 2px 2px 0px white;
        }

        /* --- MAIN PAGE STYLES --- */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .time-machine-display {
            border: 5px solid var(--cheese-yellow);
            padding: 30px;
            border-radius: 15px;
            background: rgba(255, 215, 0, 0.05);
            box-shadow: 0 0 20px var(--cheese-orange);
            margin-bottom: 30px;
            width: 100%;
            max-width: 600px;
        }

        .clock-display {
            font-size: clamp(1.5rem, 8vw, 3rem);
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            margin: 20px 0;
        }

        .glitch-text {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            animation: flicker 1.5s infinite;
            margin-bottom: 10px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .action-btn {
            background-color: var(--cheese-yellow);
            color: #000;
            padding: 15px 30px;
            font-size: 1.1rem;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 0 var(--cheese-orange);
        }

        .action-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 0 var(--cheese-orange);
            background-color: white;
        }

        /* --- ARCHIVE SECTION --- */
        .archive-section {
            margin-top: 40px;
            border-top: 1px dashed var(--cheese-orange);
            padding-top: 20px;
            width: 100%;
            max-width: 400px;
        }

        .archive-title {
            font-size: 0.9rem;
            color: var(--cheese-orange);
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .archive-links-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .archive-link {
            color: var(--neon-blue);
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid var(--neon-blue);
            padding: 8px 15px;
            transition: all 0.3s;
            flex: 1;
            min-width: 140px;
        }

        .archive-link:hover {
            background: var(--neon-blue);
            color: #000;
        }

        .floating-cheese {
            position: fixed;
            font-size: 2rem;
            opacity: 0.3;
            animation: float 10s infinite linear;
            z-index: -1;
        }

        @keyframes flicker {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- FIRST VISIT POPUP -->
    <div id="first-visit-popup" class="popup-overlay">
        <div class="popup-content">
            <span class="close-x" onclick="closePopup()">&times;</span>
            <h1>HEY YOU</h1>
            <p>Welcome to the <strong>Cheezy Time Machine</strong>.</p>
            <p>Initiating temporal sequence...</p>
            <button class="action-btn" onclick="closePopup()" style="margin-top:20px; box-shadow: none;">ENTER PORTAL</button>
        </div>
    </div>

    <!-- MAIN PAGE -->
    <div class="container">
        <div class="glitch-text">Temporal Status: Grating...</div>
        
        <div class="time-machine-display">
            <h2>CHEESY TIME MACHINE</h2>
            <div class="clock-display" id="clock">00:00:00:000</div>
            <p>COORDINATES: <span style="color:white">CHEEZ-NOODLEZ SECTOR</span></p>
        </div>

        <div class="btn-group">
            <div class="archive-section">
                <div class="archive-title">TEMPORAL LOGS DETECTED:</div>
                <div class="archive-links-container">
                    <a href="https://cheez-noodlez.online/old-pages/2026.html" class="archive-link">
                        2026 ARCHIVE
                    </a>
                    <a href="old-index.html" class="archive-link">
                        ORIGINAL INDEX
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Background Elements -->
    <script>
        // Setup floating cheese background
        for(let i = 0; i < 15; i++) {
            let cheese = document.createElement('div');
            cheese.className = 'floating-cheese';
            cheese.innerHTML = '🧀';
            cheese.style.left = Math.random() * 100 + 'vw';
            cheese.style.animationDelay = Math.random() * 10 + 's';
            cheese.style.fontSize = (Math.random() * 2 + 1) + 'rem';
            document.body.appendChild(cheese);
        }

        // Time Machine Clock
        function updateClock() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' +
                            now.getMinutes().toString().padStart(2, '0') + ':' +
                            now.getSeconds().toString().padStart(2, '0') + ':' +
                            now.getMilliseconds().toString().padStart(3, '0');
            document.getElementById('clock').innerText = timeStr;
        }
        setInterval(updateClock, 1);

        // First Visit Logic
        window.onload = function() {
            if (!localStorage.getItem('cheesy_visited')) {
                document.getElementById('first-visit-popup').style.display = 'flex';
            }
        };

        function closePopup() {
            localStorage.setItem('cheesy_visited', 'true');
            document.getElementById('first-visit-popup').style.display = 'none';
        }
    </script>
</body>
</html>
